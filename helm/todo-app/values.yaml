# Default values for todo-app Helm chart

# --- Backend Service (FastAPI + AI Chatbot) ---
backend:
  name: todo-backend
  image:
    repository: todo-backend
    tag: latest
    pullPolicy: Never
  replicas: 1
  port: 8000
  service:
    type: NodePort
    port: 8000
    nodePort: 30001
  env:
    DATABASE_URL: ""
    GEMINI_API_KEY: ""
    GEMINI_MODEL: "gemini-2.5-flash"
    CORS_ORIGINS: "http://localhost:3000,http://todo-frontend:3000"

# --- Frontend Service (Next.js) ---
frontend:
  name: todo-frontend
  image:
    repository: todo-frontend
    tag: latest
    pullPolicy: Never
  replicas: 1
  port: 3000
  service:
    type: NodePort
    port: 3000
    nodePort: 30000
  env:
    NEXT_PUBLIC_API_URL: "http://todo-backend:8000"
